<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Owner Dashboard | Douceur De Yani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #fcfcfc; }
        input, select, textarea { font-size: 16px !important; }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04); }
        .img-fit { object-fit: contain; background-color: #f5f5f4; }
        .promo-input { border: 1px solid #fee2e2 !important; background-color: #fef2f2 !important; color: #b91c1c !important; }
        textarea { resize: none; }

        /* Style Overlay Login */
        #login-overlay { 
            position: fixed; 
            inset: 0; 
            background: #FDFBF7; 
            z-index: 10000; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 24px; 
        }
    </style>
</head>
<body class="min-h-screen pb-24 font-sans text-stone-800">

    <div id="login-overlay">
        <div class="w-full max-w-xs text-center space-y-6">
            <div class="space-y-2">
                <h1 class="font-black italic text-2xl uppercase tracking-tighter text-stone-800">Owner Access</h1>
                <p class="text-[9px] font-bold text-stone-400 uppercase tracking-[0.3em]">Douceur De Yani</p>
            </div>
            <input type="password" id="pin-input" placeholder="Masukkan PIN Akses..." 
                class="w-full p-4 bg-white border border-stone-200 rounded-2xl text-center focus:ring-2 focus:ring-amber-200 outline-none shadow-sm text-lg font-bold">
            <button onclick="cekAkses()" 
                class="w-full py-4 bg-stone-800 text-white rounded-2xl font-bold text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                Buka Dashboard
            </button>
            <p id="error-pin" class="text-red-500 text-[10px] font-bold uppercase hidden">PIN Salah!</p>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <nav class="bg-white p-6 sticky top-0 z-50 flex justify-between items-center border-b border-stone-100 shadow-sm">
            <div class="flex items-center gap-3">
                <div id="status-badge"></div>
                <div>
                    <h1 class="font-black tracking-tighter text-lg uppercase italic leading-none">DASHBOARD</h1>
                    <p class="text-[7px] font-bold text-stone-400 tracking-[0.3em] uppercase">Control Center</p>
                </div>
            </div>
            <button onclick="logout()" class="flex items-center gap-2 bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest border border-red-100 active:scale-90 transition-all">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </nav>

        <div class="max-w-md mx-auto p-6 space-y-8">
            
            <section class="bg-white p-6 rounded-[2.5rem] card-shadow border border-stone-100">
                <h2 class="font-bold text-[10px] uppercase tracking-widest mb-4 text-stone-400 text-center">Jadwal Operasional</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-4 bg-stone-50 rounded-2xl">
                        <span class="text-xs font-bold text-stone-500 uppercase">Status Manual</span>
                        <button onclick="toggleToko()" id="btn-toggle-toko" class="px-5 py-2 rounded-xl text-[10px] font-bold uppercase transition-all shadow-sm border bg-white"></button>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="time" id="jam-buka" class="p-4 bg-stone-50 rounded-2xl text-sm font-bold text-center border-none">
                        <input type="time" id="jam-tutup" class="p-4 bg-stone-50 rounded-2xl text-sm font-bold text-center border-none">
                    </div>
                    <button onclick="simpanJam()" class="w-full py-4 bg-stone-800 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">Update Jadwal</button>
                </div>
            </section>

            <section class="bg-white p-6 rounded-[2.5rem] card-shadow border border-stone-100">
                <h2 class="font-bold text-[10px] uppercase tracking-widest mb-4 text-stone-400 text-center uppercase">Atur Syarat & Ketentuan</h2>
                <div class="space-y-4">
                    <textarea id="input-sk" rows="5" placeholder="Tulis aturan toko (PO, Ongkir, dll) di sini..." 
                        class="w-full p-4 bg-stone-50 rounded-2xl text-xs border-none focus:ring-2 focus:ring-amber-200 leading-relaxed outline-none"></textarea>
                    <button onclick="simpanSK()" class="w-full py-4 bg-amber-800 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all shadow-lg">
                        Simpan S&K Terbaru
                    </button>
                </div>
            </section>

            <section class="bg-white p-6 rounded-[2.5rem] card-shadow border border-stone-100">
                <h2 class="font-bold text-[10px] uppercase tracking-widest mb-4 text-stone-400 text-center">Tambah Menu Baru</h2>
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-stone-400 uppercase ml-2">Link Foto (Direct Link)</label>
                        <input type="text" id="link-gambar" placeholder="Tempel link foto disini..." class="w-full p-4 bg-stone-50 rounded-2xl text-sm border-none focus:ring-2 focus:ring-amber-200" oninput="cekPreview(this.value)">
                    </div>

                    <div class="relative w-full aspect-square bg-stone-100 rounded-[2rem] overflow-hidden border border-stone-200 flex items-center justify-center">
                        <img id="img-preview" src="" class="w-full h-full img-fit hidden">
                        <div id="text-preview" class="text-center text-stone-300 italic text-[10px]">Preview Foto</div>
                    </div>

                    <input type="text" id="nama" placeholder="Nama Kue..." class="w-full p-4 bg-stone-50 rounded-2xl text-sm border-none">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <select id="jenis" class="p-4 bg-stone-50 rounded-2xl text-sm font-bold text-stone-500 border-none">
                            <option value="Kue">Kue Kering</option>
                            <option value="Roti">Roti</option>
                            <option value="Promo">🔥 PROMO SPESIAL</option>
                        </select>
                        <input type="text" id="berat" placeholder="500gr" class="p-4 bg-stone-50 rounded-2xl text-sm border-none">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="harga" placeholder="Harga Jual" class="p-4 bg-stone-50 rounded-2xl text-sm border-none">
                        <input type="number" id="stok" placeholder="Stok" class="p-4 bg-stone-50 rounded-2xl text-sm border-none">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[9px] font-bold text-red-500 uppercase ml-2 italic">Harga Coret / Sebelum Diskon (Opsional)</label>
                        <input type="number" id="harga-coret" placeholder="Masukkan harga lebih tinggi..." class="w-full p-4 promo-input rounded-2xl text-sm border-none focus:ring-2 focus:ring-red-200 font-bold">
                    </div>

                    <button onclick="tambahMenu()" id="btn-tambah" class="w-full py-5 bg-amber-800 text-white rounded-[2rem] text-[10px] font-black uppercase tracking-[0.3em] shadow-lg active:scale-95 transition-all">
                        SIMPAN PRODUK
                    </button>
                </div>
            </section>

            <h3 class="text-[10px] font-black text-stone-400 uppercase tracking-[0.4em] text-center">Produk Terpasang</h3>
            <div id="list-menu" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // --- LOGIKA LOGIN PIN & DEVICE STORAGE ---
        const PIN_AKSES = "yani123";

        window.onload = function() {
            if (localStorage.getItem('ownerLoggedIn') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }
        };

        function cekAkses() {
            const input = document.getElementById('pin-input').value;
            if (input === PIN_AKSES) {
                localStorage.setItem('ownerLoggedIn', 'true');
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                document.getElementById('error-pin').classList.remove('hidden');
                document.getElementById('pin-input').value = "";
            }
        }

        function logout() {
            if(confirm("Keluar dari dashboard?")) {
                localStorage.removeItem('ownerLoggedIn');
                location.reload();
            }
        }

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyByGpucXRAToCpkTLf9R-k1YqDQ75Zm5_E",
          authDomain: "douceurdeyani.firebaseapp.com",
          projectId: "douceurdeyani",
          storageBucket: "douceurdeyani.firebasestorage.app",
          messagingSenderId: "349596738343",
          appId: "1:349596738343:web:a2ab4e333b42a68b3fbf02"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- DASHBOARD FUNCTIONS ---
        db.collection("pengaturan").doc("toko").onSnapshot((doc) => {
            const data = doc.data() || { isOpen: true, buka: "07:00", tutup: "21:00", sk: "" };
            const btn = document.getElementById('btn-toggle-toko');
            btn.innerText = data.isOpen ? "BUKA" : "TUTUP";
            btn.className = data.isOpen ? "px-5 py-2 rounded-xl text-[10px] font-bold bg-green-50 text-green-600 border border-green-200" : "px-5 py-2 rounded-xl text-[10px] font-bold bg-red-50 text-red-600 border border-red-200";
            document.getElementById('status-badge').innerHTML = `<div class="w-3 h-3 rounded-full ${data.isOpen ? 'bg-green-500 animate-pulse' : 'bg-red-500'} border-2 border-white"></div>`;
            document.getElementById('jam-buka').value = data.buka || "07:00";
            document.getElementById('jam-tutup').value = data.tutup || "21:00";
            document.getElementById('input-sk').value = data.sk || "";
            window.statusTGlobal = data.isOpen;
        });

        async function toggleToko() { await db.collection("pengaturan").doc("toko").set({ isOpen: !window.statusTGlobal }, { merge: true }); }
        
        async function simpanJam() { 
            await db.collection("pengaturan").doc("toko").set({ buka: document.getElementById('jam-buka').value, tutup: document.getElementById('jam-tutup').value }, { merge: true }); 
            alert("Jadwal Berhasil Diupdate!");
        }

        async function simpanSK() {
            const teksSK = document.getElementById('input-sk').value;
            await db.collection("pengaturan").doc("toko").set({ sk: teksSK }, { merge: true });
            alert("Syarat & Ketentuan Berhasil Diupdate!");
        }

        function cekPreview(url) {
            const img = document.getElementById('img-preview');
            const txt = document.getElementById('text-preview');
            if(url.includes('http')) {
                img.src = url; img.classList.remove('hidden'); txt.classList.add('hidden');
            }
        }

        async function tambahMenu() {
            const btn = document.getElementById('btn-tambah');
            const link = document.getElementById('link-gambar').value;
            const nama = document.getElementById('nama').value;
            const harga = document.getElementById('harga').value;
            const hargaCoretVal = document.getElementById('harga-coret').value; 

            if(!nama || !harga || !link) return alert("Lengkapi data!");
            btn.disabled = true;

            try {
                await db.collection("menuToko").add({
                    nama, jenis: document.getElementById('jenis').value, 
                    berat: document.getElementById('berat').value,
                    harga: "Rp " + Number(harga).toLocaleString('id-ID'), 
                    hargaCoret: hargaCoretVal ? "Rp " + Number(hargaCoretVal).toLocaleString('id-ID') : null,
                    stok: Number(document.getElementById('stok').value) || 0,
                    gambar: link, tgl: new Date()
                });
                alert("Menu Berhasil Ditambahkan!");
                location.reload();
            } catch (e) { alert("Error!"); btn.disabled = false; }
        }

        db.collection("menuToko").orderBy("tgl", "desc").onSnapshot(snapshot => {
            const wadah = document.getElementById('list-menu'); wadah.innerHTML = "";
            snapshot.forEach(doc => {
                const item = doc.data();
                wadah.innerHTML += `
                    <div class="bg-white p-5 rounded-[2.5rem] card-shadow border border-stone-100 flex flex-col gap-4">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-2xl bg-stone-100 overflow-hidden border border-stone-100">
                                <img src="${item.gambar}" class="w-full h-full img-fit" onerror="this.src='https://placehold.co/200x200?text=Error'">
                            </div>
                            <div class="flex-1">
                                <h4 class="font-black text-stone-800 text-[11px] uppercase">${item.nama}</h4>
                                <p class="text-[10px] text-amber-800 font-black">${item.harga}</p>
                            </div>
                            <button onclick="hapusMenu('${doc.id}')" class="text-stone-300 p-2"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div class="flex items-center justify-between bg-stone-50 p-2 rounded-2xl border border-stone-100">
                            <button onclick="updateStok('${doc.id}', -1)" class="w-12 h-12 bg-white rounded-xl shadow-sm text-stone-400 flex items-center justify-center border border-stone-100"><i class="fas fa-minus"></i></button>
                            <div class="text-center"><p class="text-[8px] font-black text-stone-300 uppercase">Stok</p><p class="text-sm font-black text-stone-800">${item.stok}</p></div>
                            <button onclick="updateStok('${doc.id}', 1)" class="w-12 h-12 bg-stone-800 rounded-xl shadow-lg text-white flex items-center justify-center"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>`;
            });
        });

        async function updateStok(id, change) {
            const docRef = db.collection("menuToko").doc(id);
            const doc = await docRef.get();
            let stokBaru = (Number(doc.data().stok) || 0) + change;
            if(stokBaru >= 0) await docRef.update({ stok: stokBaru });
        }
        async function hapusMenu(id) { if(confirm("Hapus?")) await db.collection("menuToko").doc(id).delete(); }
    </script>
</body>
</html>
